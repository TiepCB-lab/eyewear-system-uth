<!--=============== PRODUCTS MODULE ===============-->
<h2 class="section__title">Catalog Management</h2>

<div class="metrics-grid">
    <div class="metric-card">
        <div class="metric-label">Active Listing</div>
        <div class="metric-value">...</div>
        <button class="btn btn--sm mt-1 admin-button-block">Add New Product</button>
    </div>
    <div class="metric-card">
        <div class="metric-label">Hidden / Draft</div>
        <div class="metric-value">...</div>
    </div>
</div>

<div class="admin-table container admin-panel">
    <div class="table__header mb-4">
        <h3 class="table__title">Product Catalog</h3>
    </div>
    
    <!-- Filter Section (Borrowed from Inventory style) -->
    <div class="filter-section mb-4">
        <div class="filter-grid" style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px;">
            <div class="filter-group search">
                <label for="productSearch" style="display: block; font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">Search Product</label>
                <input type="text" id="productSearch" placeholder="Enter product name or brand..." style="width: 100%; height: 45px; border-radius: 12px; padding: 0 15px; border: 1px solid #e2e8f0;">
            </div>
            <div class="filter-group select">
                <label for="categoryFilter" style="display: block; font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">Category</label>
                <select id="categoryFilter" style="width: 100%; height: 45px; border-radius: 12px; padding: 0 15px; border: 1px solid #e2e8f0;">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="filter-group select">
                <label for="statusFilter" style="display: block; font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">Status</label>
                <select id="statusFilter" style="width: 100%; height: 45px; border-radius: 12px; padding: 0 15px; border: 1px solid #e2e8f0;">
                    <option value="all">All Status</option>
                    <option value="1">Active Only</option>
                    <option value="0">Hidden Only</option>
                </select>
            </div>
        </div>
    </div>

    <div class="table__container">
        <table class="table">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="productsTableBody">
                <tr>
                    <td colspan="5" class="table-state-cell">Loading products...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module" src="/js/dashboard/modules/products-controller.js"></script>
