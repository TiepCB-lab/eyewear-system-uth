<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FLATICON ===============-->
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css" />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../../assets/css/admin.css" />
    <link rel="stylesheet" href="../../../assets/css/refactor-utils.css" />

    <!--=============== SCRIPTS ===============-->
    <script src="../../../js/core/layout-loader.js" defer></script>
    <script type="module" src="../../../js/core/ui-permissions.js" defer></script>

    <title>Support Ticket Detail — Staff</title>
</head>
<body class="admin-body layout-staff">
    <aside class="sidebar" data-include="layout/StaffSidebar"></aside>

    <main class="admin-main">
        <header class="admin-header flex" data-include="layout/AdminHeader"></header>

        <section class="support-detail section--lg">
            <div class="container support-detail__header">
                <a href="../index.html?view=support" class="support-detail__back">
                    <i class="fi fi-rs-arrow-left"></i>
                    Back to Support Tickets
                </a>
                <h1 class="section__title support-detail__title" id="pageTicketTitle">Support Ticket Details</h1>
                <p class="support-detail__subtitle">Review the ticket summary, follow the conversation thread, and reply or update status in the dedicated staff page.</p>
            </div>

            <div class="support-detail__container container grid">
                <aside class="checkout__group support-detail__group support-detail__summary-card">
                    <div class="support-detail__summary-head">
                        <p class="support-detail__eyebrow">Ticket Summary</p>
                        <h3 class="support-detail__section-title">At a glance</h3>
                    </div>
                    <div id="ticketDetail" class="support-ticket-detail">Loading ticket details...</div>

                    <div class="support-panel__status">
                        <label class="support-panel__label">Update Status:</label>
                        <div class="flex support-panel__actions">
                            <button type="button" class="btn btn--sm support-status-btn--progress" data-support-status="in_progress">In Progress</button>
                            <button type="button" class="btn btn--sm support-status-btn--resolved" data-support-status="resolved">Resolved</button>
                            <button type="button" class="btn btn--sm support-status-btn--closed" data-support-status="closed">Close</button>
                        </div>
                    </div>
                </aside>

                <section class="checkout__group support-detail__group support-detail__thread-card">
                    <div class="support-detail__thread-head">
                        <div>
                            <p class="support-detail__eyebrow">Conversation</p>
                            <h3 class="support-detail__section-title">Messages</h3>
                        </div>
                    </div>
                    <p id="threadNotice" class="support-thread-notice" hidden></p>
                    <div id="replies" class="support-replies support-thread">Loading replies...</div>

                    <form id="replyForm" class="support-reply-form form grid">
                        <textarea
                            name="replyMessage"
                            class="form__input textarea"
                            rows="5"
                            placeholder="Write a reply..."
                            required
                        ></textarea>
                        <div class="support-reply-actions">
                            <button type="submit" class="btn btn--md">Send Reply</button>
                        </div>
                        <p id="replySuccess" class="growth-positive" hidden>Your reply has been sent.</p>
                        <p id="replyError" class="support-ticket-error" hidden></p>
                    </form>
                </section>
            </div>
        </section>
    </main>

    <script type="module" src="../../../js/dashboard/modules/support-detail.js"></script>
</body>
</html>
