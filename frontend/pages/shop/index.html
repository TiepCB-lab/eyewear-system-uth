<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FLATICON ===============-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css"
    />
    
    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/pages/catalog.css" />
    
    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../js/core/layout-loader.js" defer></script>

    <title>Shop - EYEWEAR.UTH</title>
  </head>
  <body>
    <!--=============== HEADER ===============-->
    <header class="header" data-include="layout/Header"></header>

    <main class="main">

      <!--=============== CATALOG LAYOUT ===============-->
      <section class="section--lg container">
        <div class="catalog-layout">
          <!-- Sidebar Filters injected here -->
          <aside id="catalogFilterMount" class="catalog-sidebar" aria-label="Product Filters"></aside>

          <!-- Main Catalog Content -->
          <section class="catalog-main" aria-live="polite">
            <div class="toolbar">
              <div class="toolbar-group">
                <strong id="resultCount">0 products found</strong>
              </div>

              <div class="toolbar-group">
                <select id="sortSelect" class="form__input" aria-label="Sort products">
                  <option value="featured">Featured</option>
                  <option value="price-asc">Price: Low to High</option>
                  <option value="price-desc">Price: High to Low</option>
                  <option value="name-asc">Name: A-Z</option>
                </select>

                <div class="view-switch" role="group" aria-label="Switch product view">
                  <button class="view-btn active" id="gridViewBtn" type="button" aria-label="Grid view">
                    <i class="fi fi-rs-apps"></i>
                  </button>
                  <button class="view-btn" id="listViewBtn" type="button" aria-label="List view">
                    <i class="fi fi-rs-list"></i>
                  </button>
                </div>
              </div>
            </div>

            <!-- Products injected here -->
            <div id="productContainer" class="catalog-products grid-view"></div>
          </section>
        </div>
      </section>

      <!--=============== NEWSLETTER ===============-->
      <section class="newsletter section" data-include="components/newsletter"></section>
    </main>

    <!--=============== FOOTER ===============-->
    <footer class="footer container" data-include="layout/Footer"></footer>

    <!--=============== JS ===============-->
    <script src="../../js/main.js"></script>
    <script src="../../js/pages/shop.js"></script>
  </body>
</html>
