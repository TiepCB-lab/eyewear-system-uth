<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FLATICON ===============-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css"
    />

    <!--=============== SWIPER CSS ===============-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../assets/css/styles.css" />

    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../../js/core/layout-loader.js" defer></script>

    <title>Cart — EYEWEAR.UTH</title>
  </head>
  <body>
    <!--=============== HEADER ===============-->
    <!--=============== HEADER ===============-->
    <header class="header" data-include="layout/Header"></header>

    <!--=============== MAIN ===============-->
    <main class="main">
      

      <!--=============== CART ===============-->
      <section class="cart section--lg container">
        <div class="table__container">
          <table class="table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th>Rename</th>
              </tr>
            </thead>
            <tbody id="cart-items">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>

        <div class="cart__actions">
          <a href="#" class="btn flex btn__md">
            <i class="fi-rs-shuffle"></i> Update Cart
          </a>
          <a href="#" class="btn flex btn__md">
            <i class="fi-rs-shopping-bag"></i> Continue Shopping
          </a>
        </div>

        <div class="divider">
          <i class="fi fi-rs-fingerprint"></i>
        </div>

        <div class="cart__group grid">
          <div>
            <div class="cart__shippinp">
              <h3 class="section__title">Calculate Shipping</h3>
              <form action="" class="form grid">
                <input
                  type="text"
                  class="form__input"
                  placeholder="State / Country"
                />
                <div class="form__group grid">
                  <input type="text" class="form__input" placeholder="City" />
                  <input
                    type="text"
                    class="form__input"
                    placeholder="PostCode"
                  />
                </div>
                <div class="form__btn">
                  <button class="btn flex btn--sm">
                    <i class="fi-rs-shuffle"></i> Update
                  </button>
                </div>
              </form>
            </div>
            <div class="cart__coupon">
              <h3 class="section__title">Apply Coupon</h3>
              <form action="" class="coupon__form form grid">
                <div class="form__group grid">
                  <input
                    type="text"
                    class="form__input"
                    placeholder="Enter Your Coupon"
                  />
                  <div class="form__btn">
                    <button class="btn flex btn--sm">
                      <i class="fi-rs-label"></i> Aplly
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <div class="cart__total">
            <h3 class="section__title">Cart Totals</h3>
            <table class="cart__total-table">
                <tr>
                  <td><span class="cart__total-title">Cart Subtotal</span></td>
                  <td><span class="cart__total-price" id="cart-subtotal">$0.00</span></td>
                </tr>
                <tr>
                  <td><span class="cart__total-title">Shipping</span></td>
                  <td><span class="cart__total-price">$0.00</span></td>
                </tr>
                <tr>
                  <td><span class="cart__total-title">Total</span></td>
                  <td><span class="cart__total-price" id="cart-total">$0.00</span></td>
                </tr>
            </table>
            <a href="../checkout/" class="btn flex btn--md">
              <i class="fi fi-rs-box-alt"></i> Proceed To Checkout
            </a>
          </div>
        </div>
      </section>

      <!--=============== NEWSLETTER ===============-->
      <section class="newsletter section" data-include="components/newsletter"></section>
    </main>

    <!--=============== FOOTER ===============-->
    <footer class="footer container" data-include="layout/Footer"></footer>

    <!--=============== SWIPER JS ===============-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="../../../js/main.js"></script>

    <script type="module">
      import { CartService } from '../../../js/services/cartService.js';

      document.addEventListener('DOMContentLoaded', async () => {
        const tbody = document.getElementById('cart-items');
        const subtotalEl = document.getElementById('cart-subtotal');
        const totalEl = document.getElementById('cart-total');

        const loadCart = async () => {
          try {
            const result = await CartService.getCart();
            const items = result.data;
            const totals = result.totals;

            tbody.innerHTML = '';
            
            if (!items || items.length === 0) {
              tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">Giỏ hàng trống</td></tr>';
              subtotalEl.innerText = '$0.00';
              totalEl.innerText = '$0.00';
              return;
            }

            items.forEach(item => {
              const tr = document.createElement('tr');
              const itemTotal = item.unit_price * item.quantity;
              
              tr.innerHTML = `
                <td>
                  <img src="${item.image_2d_url || '../../../assets/images/products/placeholder.png'}" alt="${item.product_name}" class="table__img" />
                </td>
                <td>
                  <h3 class="table__title">${item.product_name}</h3>
                  <p class="table__description">
                    Color: ${item.color || 'N/A'}, Size: ${item.size || 'N/A'} <br>
                    ${item.lens_name ? `Lens: ${item.lens_name} (+$${item.lens_price})` : ''}
                  </p>
                </td>
                <td><span class="table__price">${window.formatVND(item.unit_price)}</span></td>
                <td><input type="number" value="${item.quantity}" class="quantity cart-qty-input" data-id="${item.id}" min="1"/></td>
                <td><span class="subtotal">${window.formatVND(itemTotal)}</span></td>
                <td><i class="fi fi-rs-trash table__trash cart-remove-btn" data-id="${item.id}" style="cursor: pointer;"></i></td>
              `;
              tbody.appendChild(tr);
            });

            subtotalEl.innerText = window.formatVND(totals.subtotal);
            totalEl.innerText = window.formatVND(totals.total);

            // Trigger header badge update globally!
            window.dispatchEvent(new CustomEvent('content-loaded', { detail: { path: 'layout/Header' } }));            // Bind events
            document.querySelectorAll('.cart-qty-input').forEach(input => {
                input.addEventListener('change', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const qty = parseInt(e.target.value);
                    if(qty > 0) {
                        try {
                            await CartService.updateQuantity(id, qty);
                            loadCart();
                        } catch (err) {
                            alert('Không đủ tồn kho hoặc lỗi cập nhật');
                            loadCart(); // reset value
                        }
                    } else {
                        await CartService.removeItem(id);
                        loadCart();
                    }
                });
            });

            document.querySelectorAll('.cart-remove-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    if (confirm('Bạn có muốn xóa sản phẩm này khỏi giỏ hàng?')) {
                        await CartService.removeItem(id);
                        loadCart();
                    }
                });
            });

          } catch (error) {
            console.error('Lỗi khi tải giỏ hàng', error);
            if(error.response && error.response.status === 401) {
              tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">Vui lòng <a href="../auth/" style="color:var(--first-color);">đăng nhập</a> để xem giỏ hàng.</td></tr>';
            }
          }
        };

        loadCart();
      });
    </script>
  </body>
</html>
