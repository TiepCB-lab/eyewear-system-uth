<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FLATICON ===============-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css"
    />

    <!--=============== SWIPER CSS ===============-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/refactor-utils.css" />
    <script src="../../js/core/layout-loader.js" defer></script>

    <title>Checkout — EVELENS</title>
  </head>
  <body>
    <!--=============== HEADER ===============-->
    <!--=============== HEADER ===============-->
    <header class="header" data-include="layout/Header"></header>

    <!--=============== MAIN ===============-->
    <main class="main">
      <!--=============== CHECKOUT ===============-->
      <section class="checkout section--lg">
        <div class="checkout__container container grid">
          <div class="checkout__group">
            <h3 class="section__title">Billing Details</h3>
            <form class="form grid">
              <input type="text" placeholder="Name" class="form__input" id="checkout-name" />
              <input type="email" placeholder="Email" class="form__input" id="checkout-email" />
              
              <div class="checkout__address-selector" style="grid-column: 1 / -1; margin-top: 1rem;">
                <label style="display:block; margin-bottom: 0.5rem; font-weight: 500;">Shipping Address</label>
                <div class="flex" style="gap: 1rem;">
                    <select id="checkout-address-select" class="form__input" style="flex: 1;">
                        <option value="">Loading addresses...</option>
                    </select>
                    <button type="button" class="btn btn--sm" id="checkout-add-address-btn" style="white-space: nowrap;">
                        <i class="fi fi-rs-plus"></i> Add Address
                    </button>
                </div>
              </div>

              <h3 class="checkout__title" style="grid-column: 1 / -1; margin-top: 1rem;">Additional Information</h3>
              <textarea
                id="checkout-note"
                placeholder="order note"
                class="form__input textarea"
                style="grid-column: 1 / -1;"
              ></textarea>
            </form>
            <div class="address-editor-placeholder" data-include="components/modals/address-editor"></div>
          </div>
          <div class="checkout__group">
            <h3 class="section__title">Cart Totals</h3>
            <table class="order__table">
              <thead>
                <tr>
                  <th colspan="2">Products</th>
                  <th>Total</th>
                </tr>
              </thead>

              <tbody id="checkout-items">
                <!-- Rendered by JS -->
              </tbody>
              <tbody>
                <tr>
                  <td><span class="order__subtitle">Subtotal</span></td>
                  <td colspan="2"><span class="table__price" id="checkout-subtotal">$0.00</span></td>
                </tr>
                <tr>
                  <td><span class="order__subtitle">Shipping</span></td>
                  <td colspan="2">
                    <span class="table__price" id="checkout-shipping">Free Shipping</span>
                  </td>
                </tr>
                <tr>
                  <td><span class="order__subtitle">Total</span></td>
                  <td colspan="2">
                    <span class="order__grand-total" id="checkout-total">$0.00</span>
                  </td>
                </tr>
              </tbody>
            </table>
            <div class="payment__methods">
              <h3 class="checkout__title payment__title">Payment</h3>
              <div class="payment__option flex">
                <input
                  type="radio"
                  name="radio"
                  id="l1"
                  checked
                  class="payment__input"
                />
                <label for="l1" class="payment__label"
                  >Direct Bank Transfer</label
                >
              </div>
              <div class="payment__option flex">
                <input
                  type="radio"
                  name="radio"
                  id="l2"
                  class="payment__input"
                />
                <label for="l2" class="payment__label">Check Payment</label>
              </div>
              <div class="payment__option flex">
                <input
                  type="radio"
                  name="radio"
                  id="l3"
                  class="payment__input"
                />
                <label for="l3" class="payment__label">Paypal</label>
              </div>
            </div>
            <button type="button" class="btn btn--md" id="place-order-btn">Place Order</button>
          </div>
        </div>
      </section>

      <!--=============== NEWSLETTER ===============-->
      <section class="newsletter section" data-include="components/newsletter"></section>
    </main>

    <!--=============== FOOTER ===============-->
    <footer class="footer container" data-include="layout/Footer"></footer>

    <!--=============== SWIPER JS ===============-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="../../js/main.js"></script>
    <script src="../../js/pages/checkout.js" type="module"></script>
  </body>
</html>
