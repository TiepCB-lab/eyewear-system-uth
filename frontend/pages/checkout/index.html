<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FLATICON ===============-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css"
    />

    <!--=============== SWIPER CSS ===============-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../assets/css/styles.css" />

    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../../js/core/layout-loader.js" defer></script>

    <title>Checkout — EYEWEAR.UTH</title>
  </head>
  <body>
    <!--=============== HEADER ===============-->
    <!--=============== HEADER ===============-->
    <header class="header" data-include="layout/Header"></header>

    <!--=============== MAIN ===============-->
    <main class="main">
      

      <!--=============== CHECKOUT ===============-->
      <section class="checkout section--lg">
        <div class="checkout__container container grid">
          <div class="checkout__group">
            <h3 class="section__title">Billing Details</h3>
            <form class="form grid">
              <input type="text" placeholder="Name" class="form__input" />
              <input type="text" placeholder="Address" class="form__input" />
              <input type="text" placeholder="City" class="form__input" />
              <input type="text" placeholder="Country" class="form__input" />
              <input type="text" placeholder="Postcode" class="form__input" />
              <input type="text" placeholder="Phone" class="form__input" />
              <input type="email" placeholder="Email" class="form__input" />
              <h3 class="checkout__title">Additional Information</h3>
              <textarea
                name=""
                placeholder="order note"
                class="form__input textarea"
              ></textarea>
            </form>
          </div>
          <div class="checkout__group">
            <h3 class="section__title">Cart Totals</h3>
            <table class="order__table">
              <thead>
                <tr>
                  <th colspan="2">Products</th>
                  <th>Total</th>
                </tr>
              </thead>

              <tbody id="checkout-items">
                <!-- Rendered by JS -->
              </tbody>
              <tbody>
                <tr>
                  <td><span class="order__subtitle">Subtotal</span></td>
                  <td colspan="2"><span class="table__price" id="checkout-subtotal">$0.00</span></td>
                </tr>
                <tr>
                  <td><span class="order__subtitle">Shipping</span></td>
                  <td colspan="2">
                    <span class="table__price" id="checkout-shipping">Free Shipping</span>
                  </td>
                </tr>
                <tr>
                  <td><span class="order__subtitle">Total</span></td>
                  <td colspan="2">
                    <span class="order__grand-total" id="checkout-total">$0.00</span>
                  </td>
                </tr>
              </tbody>
            </table>
            <div class="payment__methods">
              <h3 class="checkout__title payment__title">Payment</h3>
              <div class="payment__option flex">
                <input
                  type="radio"
                  name="radio"
                  id="l1"
                  checked
                  class="payment__input"
                />
                <label for="l1" class="payment__label"
                  >Direct Bank Transfer</label
                >
              </div>
              <div class="payment__option flex">
                <input
                  type="radio"
                  name="radio"
                  id="l2"
                  class="payment__input"
                />
                <label for="l2" class="payment__label">Check Payment</label>
              </div>
              <div class="payment__option flex">
                <input
                  type="radio"
                  name="radio"
                  id="l3"
                  class="payment__input"
                />
                <label for="l3" class="payment__label">Paypal</label>
              </div>
            </div>
            <button type="button" class="btn btn--md" id="place-order-btn">Place Order</button>
          </div>
        </div>
      </section>

      <!--=============== NEWSLETTER ===============-->
      <section class="newsletter section" data-include="components/newsletter"></section>
    </main>

    <!--=============== FOOTER ===============-->
    <footer class="footer container" data-include="layout/Footer"></footer>

    <!--=============== SWIPER JS ===============-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="../../../js/main.js"></script>

    <script type="module">
      import { CartService } from '../../../js/services/cartService.js';

      document.addEventListener('DOMContentLoaded', async () => {
        const tbody = document.getElementById('checkout-items');
        const subtotalEl = document.getElementById('checkout-subtotal');
        const totalEl = document.getElementById('checkout-total');
        const placeOrderBtn = document.getElementById('place-order-btn');

        let cartData = [];

        try {
          const result = await CartService.getCart();
          cartData = result.data;
          const totals = result.totals;

          if (!cartData || cartData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 2rem;">Giỏ hàng trống</td></tr>';
            placeOrderBtn.style.display = 'none';
            return;
          }

          tbody.innerHTML = '';
          cartData.forEach(item => {
            const tr = document.createElement('tr');
            const pt = item.unit_price * item.quantity;
            tr.innerHTML = `
              <td>
                <img src="${item.image_2d_url || '../../../assets/images/products/placeholder.png'}" alt="" class="order__img" />
              </td>
              <td>
                <h3 class="table__title">${item.product_name}</h3>
                <p class="table__quantity">x ${item.quantity}</p>
              </td>
              <td><span class="table__price">${window.formatVND(pt)}</span></td>
            `;
            tbody.appendChild(tr);
          });

          subtotalEl.innerText = window.formatVND(totals.subtotal);
          totalEl.innerText = window.formatVND(totals.total);

        } catch(error) {
          console.error("Failed to load checkout cart", error);
          tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: red;">Error loading cart</td></tr>';
        }

        placeOrderBtn.addEventListener('click', async () => {
           // Get billing info
           const addressInput = document.querySelector('input[placeholder="Address"]').value;
           const cityInput = document.querySelector('input[placeholder="City"]').value;
           const emailInput = document.querySelector('input[placeholder="Email"]').value;

           if(!addressInput || !cityInput) {
             alert('Vui lòng nhập địa chỉ và thành phố.');
             return;
           }

           const fullAddress = addressInput + ', ' + cityInput;
           
           placeOrderBtn.disabled = true;
           placeOrderBtn.innerText = 'Processing...';

           try {
             // Let checkout service handle the final save
             const res = await CartService.checkout(fullAddress, fullAddress);
             alert('Đặt hàng thành công! Order: ' + res.order_number);
             window.location.href = '../../../index.html'; // Redirect to home or account page
           } catch(e) {
             alert('Có lỗi xảy ra: ' + (e.response?.data?.message || e.message));
             placeOrderBtn.disabled = false;
             placeOrderBtn.innerText = 'Place Order';
           }
        });

      });
    </script>
  </body>
</html>
