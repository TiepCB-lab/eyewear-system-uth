<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FLATICON ===============-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css"
    />

    <!--=============== SWIPER CSS ===============-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../assets/css/styles.css" />

    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../../js/core/layout-loader.js" defer></script>

    <title>Wishlist — EYEWEAR.UTH</title>
  </head>
  <body>
    <!--=============== HEADER ===============-->
    <!--=============== HEADER ===============-->
    <header class="header" data-include="layout/Header"></header>

    <!--=============== MAIN ===============-->
    <main class="main">
      

      <!--=============== WISHLIST ===============-->
      <section class="wishlist section--lg container">
        <div class="table__container">
          <table class="table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock Status</th>
                <th>Action</th>
                <th>Remove</th>
              </tr>
            </thead>
            <tbody id="wishlist-items">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!--=============== NEWSLETTER ===============-->
      <section class="newsletter section" data-include="components/newsletter"></section>
    </main>

    <!--=============== FOOTER ===============-->
    <footer class="footer container" data-include="layout/Footer"></footer>

    <!--=============== SWIPER JS ===============-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="../../../js/main.js"></script>
    <script src="../../../js/pages/wishlist.js" type="module"></script>
  </body>
</html>
