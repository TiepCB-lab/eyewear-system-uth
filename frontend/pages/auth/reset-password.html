<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css" />
    <link rel="stylesheet" href="../../assets/css/styles.css" />

    <style>
      :root {
        --card-border: #d1d5db;
        --card-bg: #ffffff;
        --page-bg: #f3f4f6;
        --text-main: #111827;
        --text-muted: #6b7280;
        --primary: #111827;
        --danger: #dc2626;
        --success: #16a34a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #ffffff 0%, var(--page-bg) 65%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .reset-shell {
        width: min(520px, calc(100% - 32px));
      }

      .reset-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 45px -25px rgba(0, 0, 0, 0.35);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 14px;
      }

      .back-link:hover {
        color: var(--text-main);
      }

      .brand {
        text-align: center;
        margin-bottom: 14px;
      }

      .brand img {
        width: 130px;
        height: auto;
      }

      h1 {
        margin: 0;
        text-align: center;
        color: var(--text-main);
        font-size: 30px;
      }

      .subtitle {
        margin: 10px 0 22px;
        text-align: center;
        color: var(--text-muted);
      }

      .field {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 12px;
        box-sizing: border-box;
        font-size: 16px;
      }

      .field:focus {
        outline: none;
        border-color: #94a3b8;
        box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.2);
      }

      .btn-submit {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 13px;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        margin-top: 8px;
      }

      .btn-submit:hover {
        background: #000;
      }

      .message {
        min-height: 22px;
        margin: 8px 0 6px;
        font-size: 14px;
      }

      .message.error {
        color: var(--danger);
      }

      .message.success {
        color: var(--success);
      }
    </style>

    <title>Reset Password | EEVELENS</title>
  </head>
  <body>
    <div class="reset-shell">
      <a href="/pages/auth/index.html" class="back-link">
        <i class="fi fi-rs-arrow-left"></i> Back to Sign In
      </a>

      <div class="reset-card">
        <form id="reset-password-form">
          <div class="brand">
            <img src="../../assets/images/logo.png" alt="Logo" />
          </div>
          <h1>Reset Password</h1>
          <p class="subtitle">Enter your new password below.</p>

          <input class="field" type="password" id="new-password" placeholder="New Password" minlength="6" required />
          <input class="field" type="password" id="new-password-confirm" placeholder="Confirm New Password" minlength="6" required />

          <div id="reset-message" class="message" aria-live="polite"></div>
          <button type="submit" class="btn-submit">Update Password</button>
        </form>
      </div>
    </div>

    <script type="module" src="../../js/pages/reset-password.js"></script>
  </body>
</html>
