<!--=============== ORDERS MODULE ===============-->
<h2 class="section__title">Sales & Support Overview</h2>

<div class="metrics-grid">
    <div class="metric-card">
        <div class="metric-label">New Orders</div>
        <div class="metric-value" id="sales-new-orders-count">...</div>
        <div class="badge badge-pending">To Review</div>
    </div>
</div>

<div class="admin-table container admin-panel">
    <h3 class="table__title">Pending Order Verification</h3>
    <div class="table__container">
        <table class="table" id="ordersTable">
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="ordersListBody">
                <tr><td colspan="4">Loading orders...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="admin-table container admin-panel">
    <h3 class="table__title">Open Support Tickets (Customer Care)</h3>
    <div class="table__container">
        <table class="table" id="ticketsTable">
            <thead>
                <tr>
                    <th>Customer Inquiry</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="ticketsListBody">
                <tr><td colspan="4">Loading tickets...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module" src="/js/dashboard/modules/orders-module.js"></script>
