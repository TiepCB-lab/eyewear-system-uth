<!--=============== PRODUCTS MODULE ===============-->
<h2 class="section__title">Catalog Management</h2>

<div class="metrics-grid">
    <div class="metric-card">
        <div class="metric-label">Active Listing</div>
        <div class="metric-value">...</div>
        <button class="btn btn--sm mt-1 admin-button-block">Add New Product</button>
    </div>
    <div class="metric-card">
        <div class="metric-label">Hidden / Draft</div>
        <div class="metric-value">...</div>
    </div>
</div>

<div class="admin-table container admin-panel">
    <h3 class="table__title">Product Catalog</h3>
    <div class="table__container">
        <table class="table">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" class="table-state-cell">Product listing will be available in the next release...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
