<h2 class="section__title">Support Ticket Management</h2>

<div class="metrics-grid">
    <div class="metric-card">
        <div class="metric-label">Open Tickets</div>
        <div class="metric-value" id="support-open-count">...</div>
        <div class="badge badge-pending">Needs Response</div>
    </div>
    <div class="metric-card">
        <div class="metric-label">In Progress</div>
        <div class="metric-value" id="support-inprogress-count">...</div>
        <div class="badge badge-qc">Being Handled</div>
    </div>
    <div class="metric-card">
        <div class="metric-label">Resolved Today</div>
        <div class="metric-value" id="support-resolved-count">...</div>
        <div class="badge badge-active">Closed</div>
    </div>
</div>

<div class="admin-table container admin-panel">
    <div class="admin-toolbar">
        <h3 class="table__title admin-toolbar__title">All Customer Support Tickets</h3>
        <div class="admin-toolbar__actions">
            <select id="support-filter-status" class="form__input admin-filter-control">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
            </select>
            <button id="reloadSupportTicketsBtn" type="button" class="btn btn--sm">
                <i class="fi fi-rs-refresh"></i> Refresh
            </button>
        </div>
    </div>

    <table class="table" id="supportTicketsTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Customer</th>
                <th>Subject</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="supportTicketsBody">
            <tr><td colspan="7" class="table-state-cell">Loading tickets...</td></tr>
        </tbody>
    </table>
</div>

<div id="ticketDetailPanel" class="support-panel" hidden>
    <div class="flex support-panel__header">
        <h3 class="table__title admin-title-reset" id="panelTicketTitle">Ticket Details</h3>
        <button type="button" class="support-panel__close" data-action="close-support-panel">&times;</button>
    </div>

    <div id="panelTicketMeta" class="support-panel__meta"></div>

    <div class="support-panel__status">
        <label class="support-panel__label">Update Status:</label>
        <div class="flex support-panel__actions">
            <button type="button" class="btn btn--sm support-status-btn--progress" data-support-status="in_progress">In Progress</button>
            <button type="button" class="btn btn--sm support-status-btn--resolved" data-support-status="resolved">Resolved</button>
            <button type="button" class="btn btn--sm support-status-btn--closed" data-support-status="closed">Close</button>
        </div>
    </div>

    <h4 class="support-panel__thread-title">Conversation Thread</h4>
    <div id="panelRepliesContainer" class="support-panel__thread"></div>

    <div class="support-panel__reply">
        <label class="support-panel__label">Staff Reply:</label>
        <textarea id="staffReplyMessage" placeholder="Type your response to the customer..." class="form__input support-panel__textarea"></textarea>
        <button id="sendSupportReplyBtn" type="button" class="btn btn--md support-panel__reply-btn">Send Reply</button>
    </div>
</div>

<div id="ticketPanelOverlay" class="support-panel__overlay" data-action="close-support-panel" hidden></div>

<script type="module" src="/js/dashboard/modules/support-module.js"></script>
