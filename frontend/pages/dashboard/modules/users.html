<!--=============== USERS MODULE ===============-->
<div class="flex admin-flex-between">
    <h1 class="section__title admin-title-reset">Staff Management</h1>
    <button id="openCreateStaffModal" type="button" class="btn btn--sm">
        Add New Staff
    </button>
</div>

<div id="alertMessage" class="admin-alert" hidden></div>

<div class="admin-table container admin-panel admin-panel--compact">
    <div class="flex admin-filter-row">
        <input id="searchInput" class="form__input admin-input-limit-300" placeholder="Search by name/email" />
        <select id="roleFilter" class="form__input admin-input-limit-220">
            <option value="">All Roles</option>
            <option value="system_admin">System Admin</option>
            <option value="manager">Manager</option>
            <option value="sales_staff">Sales Staff</option>
            <option value="operations_staff">Operations Staff</option>
        </select>
        <select id="statusFilter" class="form__input admin-input-limit-180">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="blocked">Blocked</option>
        </select>
    </div>

    <div class="table__container">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="staffTableBody">
                <tr>
                    <td colspan="8" class="table-state-cell">Loading staff...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="staffModal" class="admin-modal" hidden>
    <div class="admin-modal__card">
        <div class="flex admin-modal__header">
            <h3 id="modalTitle" class="table__title admin-title-reset">Add New Staff</h3>
            <button id="closeStaffModal" class="btn btn--sm" type="button">Close</button>
        </div>
        <form id="staffForm">
            <div class="grid admin-modal__grid">
                <input id="fullName" class="form__input" placeholder="Full name" required>
                <input id="email" type="email" class="form__input" placeholder="Email" required>
                <input id="phone" class="form__input" placeholder="Phone">
                <select id="staffRole" class="form__input" required>
                    <option value="">Select role</option>
                    <option value="system_admin">System Admin</option>
                    <option value="manager">Manager</option>
                    <option value="sales_staff">Sales Staff</option>
                    <option value="operations_staff">Operations Staff</option>
                </select>
                <select id="staffStatus" class="form__input" required>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="blocked">Blocked</option>
                </select>
            </div>
            <div class="flex admin-modal__actions">
                <button type="submit" class="btn btn--sm"><span id="submitText">Create Staff</span></button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="/js/dashboard/modules/staff-mgmt.js"></script>
