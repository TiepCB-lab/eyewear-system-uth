<!--=============== USERS MODULE ===============-->
<div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1 class="section__title" style="margin: 0;">Staff Management</h1>
    <button class="btn btn--sm" onclick="openCreateModal()">
        Add New Staff
    </button>
</div>

<div id="alertMessage" style="display:none; margin-bottom: 1rem; padding: 0.75rem; border-radius: 6px;"></div>

<div class="admin-table container" style="background: #fff; padding: 1rem; border-radius: 12px; box-shadow: var(--card-shadow);">
    <div class="flex" style="gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
        <input id="searchInput" class="form__input" style="max-width: 300px;" placeholder="Search by name/email" />
        <select id="roleFilter" class="form__input" style="max-width: 220px;">
            <option value="">All Roles</option>
            <option value="system_admin">System Admin</option>
            <option value="manager">Manager</option>
            <option value="sales_staff">Sales Staff</option>
            <option value="operations_staff">Operations Staff</option>
        </select>
        <select id="statusFilter" class="form__input" style="max-width: 180px;">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="blocked">Blocked</option>
        </select>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="staffTableBody">
            <tr>
                <td colspan="8" style="text-align:center;">Loading staff...</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Staff Modal -->
<div id="staffModal" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items:center; justify-content:center; z-index: 999;">
    <div style="background:#fff; width:min(520px, 92vw); border-radius:12px; padding:1.25rem;">
        <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3 id="modalTitle" class="table__title" style="margin: 0;">Add New Staff</h3>
            <button class="btn btn--sm" type="button" onclick="closeModal()">Close</button>
        </div>
        <form id="staffForm" onsubmit="handleFormSubmit(event)">
            <div class="grid" style="gap: 0.75rem;">
                <input id="fullName" class="form__input" placeholder="Full name" required>
                <input id="email" type="email" class="form__input" placeholder="Email" required>
                <input id="phone" class="form__input" placeholder="Phone">
                <select id="staffRole" class="form__input" required>
                    <option value="">Select role</option>
                    <option value="system_admin">System Admin</option>
                    <option value="manager">Manager</option>
                    <option value="sales_staff">Sales Staff</option>
                    <option value="operations_staff">Operations Staff</option>
                </select>
                <select id="staffStatus" class="form__input" required>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="blocked">Blocked</option>
                </select>
            </div>
            <div class="flex" style="justify-content: flex-end; gap: 0.5rem; margin-top: 1rem;">
                <button type="submit" class="btn btn--sm"><span id="submitText">Create Staff</span></button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="/js/dashboard/modules/staff-mgmt.js"></script>
