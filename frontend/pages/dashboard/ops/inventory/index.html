<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management — EYEWEAR.UTH Staff Portal</title>
    
    <!--=============== FLATICON ===============-->
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css" />
    
    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../../../assets/css/admin.css" />
    <link rel="stylesheet" href="../../../../assets/css/pages/admin-inventory.css" />
    
    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../../../js/core/layout-loader.js" defer></script>
</head>
<body class="admin-body">
    <aside class="sidebar" data-include="layout/StaffSidebar"></aside>

    <main class="admin-main">
        

        <!--=============== INVENTORY SECTION ===============-->
        <section class="inventory-section container section--lg">
            <div class="section-header">
                <div class="section-title-wrap">
                    <h2>Inventory Management</h2>
                    <p class="section-subtitle">Monitor stock health and update quantities in real time</p>
                </div>
                <div class="btn-group">
                    <button class="btn-export" onclick="exportToCSV()">
                        <i class="fi fi-rs-download"></i> Export CSV
                    </button>
                    <button class="btn-export btn-export--secondary" onclick="refreshData()">
                        <i class="fi fi-rs-refresh"></i> Refresh
                    </button>
                </div>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- Summary Stats -->
            <div class="summary-stats">
                <div class="stat-box">
                    <div class="stat-label">Total SKUs</div>
                    <div class="stat-value" id="totalSkus">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Stock</div>
                    <div class="stat-value" id="totalStock">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Low Stock Items</div>
                    <div class="stat-value" id="lowStock">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Out of Stock</div>
                    <div class="stat-value" id="outOfStock">0</div>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <h3 class="filter-title">Filter Inventory</h3>
                <div class="filter-grid">
                    <div class="filter-group">
                        <label for="searchProduct">Search Product / SKU</label>
                        <input type="text" id="searchProduct" placeholder="Enter product name or SKU..." onkeyup="filterInventory()"/>
                    </div>
                    <div class="filter-group">
                        <label for="filterCategory">Category</label>
                        <select id="filterCategory" onchange="filterInventory()">
                            <option value="">All Categories</option>
                            <option value="optical">Optical Frames</option>
                            <option value="sunglasses">Sunglasses</option>
                            <option value="bluelight">Blue Light</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterStatus">Stock Status</label>
                        <select id="filterStatus" onchange="filterInventory()">
                            <option value="">All Items</option>
                            <option value="in-stock">In Stock</option>
                            <option value="low-stock">Low Stock</option>
                            <option value="out-of-stock">Out of Stock</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Inventory Table -->
            <div class="table-container">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Variant</th>
                            <th>SKU</th>
                            <th>Current Stock</th>
                            <th>Reserved</th>
                            <th>Available</th>
                            <th>Reorder Level</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody"></tbody>
                </table>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <div class="empty-icon">📦</div>
                    <h3>No Products Found</h3>
                    <p>Try adjusting your search or filters</p>
                </div>
            </div>
        </section>
    </main>

    <!--=============== SCRIPTS ===============-->
    <script src="../../../../js/pages/admin-inventory.js"></script>
</body>
</html>
