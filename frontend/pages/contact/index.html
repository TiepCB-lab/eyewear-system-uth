<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../assets/css/styles.css" />

    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../js/core/layout-loader.js" defer></script>

    <title>Contact Us — EYEWEAR.UTH</title>
</head>
<body>
    <!--=============== HEADER ===============-->
    <header class="header" data-include="layout/Header"></header>

    <main class="main container section--lg">
        <h2 class="section__title">Get in Touch</h2>
        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 3rem;">
            <div>
                <h3 class="footer__title">Headquarters</h3>
                <p>572 Vo Van Kiet, District 1<br>Ho Chi Minh City, Vietnam</p>
                <p><strong>Phone:</strong> +84 123 456 789</p>
                <p><strong>Email:</strong> support@eyewear-uth.com</p>
                
                <h3 class="footer__title mt-2">Opening Hours</h3>
                <p>Mon - Fri: 08:00 AM - 09:00 PM</p>
                <p>Sat - Sun: 09:00 AM - 10:00 PM</p>
            </div>
            <form class="form grid">
                <input type="text" class="form__input" placeholder="Your Name">
                <input type="email" class="form__input" placeholder="Your Email">
                <input type="text" class="form__input" placeholder="Subject">
                <textarea rows="6" class="form__input" placeholder="Your Message"></textarea>
                <button type="submit" class="btn btn--md">Send Message</button>
            </form>
        </div>

        <!--=============== NEWSLETTER ===============-->
        <section class="newsletter section" data-include="components/newsletter"></section>
    </main>

    <!--=============== FOOTER ===============-->
    <footer class="footer container" data-include="layout/Footer"></footer>
</body>
</html>
