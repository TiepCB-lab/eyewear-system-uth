<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FLATICON ===============-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../../assets/css/refactor-utils.css" />

    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../../js/core/layout-loader.js" defer></script>

    <title>Checkout Payment â€” EVELENS</title>
  </head>
  <body class="payment-page">
    <header class="header" data-include="layout/Header"></header>

    <main class="main">
      <section class="checkout section--lg">
        <div class="payment-shell">
          <div class="payment-hero">
            <div class="payment-hero__eyebrow">Checkout Payment</div>
            <h1 class="payment-hero__title">Finalize your order</h1>
            <p class="payment-hero__subtitle">Review the bill on the left, choose how you want to pay on the right, and complete checkout in one step.</p>
          </div>

          <div class="payment-layout">
            <div class="payment-bill">
              <div class="payment-panel">
                <div class="bill-title">
                  <h3>Bill</h3>
                  <span class="bill-number" id="displayOrderId">#...</span>
                </div>

                <table class="bill-table">
                  <tbody>
                    <tr>
                      <td class="bill-label">Order number</td>
                      <td class="bill-value" id="billOrderNumber">...</td>
                    </tr>
                    <tr>
                      <td class="bill-label">Shipping</td>
                      <td class="bill-value">Free</td>
                    </tr>
                    <tr>
                      <td class="bill-label">Estimated delivery</td>
                      <td class="bill-value">3-5 days</td>
                    </tr>
                    <tr class="bill-total">
                      <td class="bill-label">Total payable</td>
                      <td class="bill-value" id="displayAmount">0 Ä‘</td>
                    </tr>
                  </tbody>
                </table>

                <div class="bill-tip">
                  Tip: Receive your order in 3-5 days.
                </div>
              </div>
            </div>

            <div class="payment-method">
              <div class="payment-panel">
                <div class="method-title">
                  <h3>Payment method</h3>
                </div>

                <form id="paymentForm">
                  <div class="payment__methods">
                    <div class="payment__option flex">
                      <input type="radio" name="payment_method" id="l1" value="cod" checked class="payment__input" />
                      <label for="l1" class="payment__label">Cash on Delivery (COD)</label>
                    </div>

                    <div class="payment__option flex">
                      <input type="radio" name="payment_method" id="l2" value="bank_transfer" class="payment__input" />
                      <label for="l2" class="payment__label">Direct Bank Transfer</label>
                    </div>

                    <div class="payment__option flex">
                      <input type="radio" name="payment_method" id="l3" value="e_wallet" class="payment__input" />
                      <label for="l3" class="payment__label">E-Wallet (MoMo / ZaloPay)</label>
                    </div>
                  </div>

                  <div class="payment-action">
                    <button type="submit" class="btn btn--md" id="btnSubmit">Process Payment</button>
                  </div>
                </form>

                <div id="paymentResult" class="payment-result"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
      
      <section class="newsletter section" data-include="components/newsletter"></section>
    </main>

    <footer class="footer container" data-include="layout/Footer"></footer>

    <script src="../../../js/main.js"></script>
    <script type="module" src="../../../js/pages/payment.js"></script>
  </body>
</html>
