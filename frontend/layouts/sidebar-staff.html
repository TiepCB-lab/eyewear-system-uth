<style>
.sidebar-link:hover {
    background: var(--first-color-alt);
    color: var(--first-color) !important;
}
.sidebar-link.active {
    background: var(--first-color);
    color: #fff !important;
}
/* Utility class for RBAC */
[data-permission] {
    display: none !important;
}
[data-permission].permission-granted {
    display: flex !important;
}
</style>

<script type="module">
    import { getCurrentUserPermissions } from '../js/core/rbac.js';
    
    async function applySidebarPermissions() {
        const { hasPermission } = await getCurrentUserPermissions();
        document.querySelectorAll('[data-permission]').forEach(el => {
            const permission = el.getAttribute('data-permission');
            if (hasPermission(permission)) {
                el.classList.add('permission-granted');
            }
        });
    }

    applySidebarPermissions();
</script>
