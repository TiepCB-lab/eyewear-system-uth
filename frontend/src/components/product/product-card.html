<article class="catalog-item">
	<a href="{{DETAIL_URL}}" class="thumb">
		<img src="{{IMAGE}}" alt="{{NAME}}" loading="lazy" />
		<span class="badge">{{BADGE}}</span>
		<span class="thumb-actions">
			<span class="thumb-action-btn" title="Quick view" aria-label="Quick view">
				<i class="fi fi-rs-eye"></i>
			</span>
			<span class="thumb-action-btn" title="Add to wishlist" aria-label="Add to wishlist">
				<i class="fi fi-rs-heart"></i>
			</span>
			<span class="thumb-action-btn" title="Compare" aria-label="Compare">
				<i class="fi fi-rs-shuffle"></i>
			</span>
		</span>
	</a>
	<div class="body">
		<p class="meta">{{CATEGORY}}</p>
		<a href="{{DETAIL_URL}}"><h3 class="name">{{NAME}}</h3></a>
		<div class="catalog-rating" aria-label="Rated 5 out of 5">
			<span class="catalog-rating__stars" aria-hidden="true">★★★★★</span>
		</div>
		<div class="catalog-actions" style="margin-top: 0.75rem">
			<div class="catalog-price-group">
				<span class="price">${{PRICE}}</span>
				<span class="old-price">${{OLD_PRICE}}</span>
			</div>
			<div class="catalog-cart-wrap">
				<span class="catalog-cart-tooltip" aria-hidden="true">Add to cart</span>
				<button
					class="catalog-cart-btn"
					type="button"
					data-add-cart="{{ID}}"
					aria-label="Add {{NAME}} to cart"
				>
					<i class="fi fi-rs-shopping-bag-add"></i>
				</button>
			</div>
		</div>
	</div>
</article>
