<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Dashboard — EYEWEAR.UTH</title>
    
    <!--=============== FLATICON ===============-->
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css" />
    
    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../../../assets/css/admin.css" />

    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../../../assets/js/core/layout-loader.js" defer></script>
</head>
<body class="admin-body">
    <!--=============== SIDEBAR ===============-->
    <aside class="sidebar" data-include="sidebar/ops"></aside>

    <!--=============== MAIN CONTENT ===============-->
    <main class="admin-main">
        <header class="admin-header flex" data-include="layout/AdminHeader"></header>

        <section class="section">
            <h2 class="section__title">Operations & Logistics Hub</h2>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">To Pack</div>
                    <div class="metric-value">42</div>
                    <div class="badge badge-pending">Priority</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Lab Fitting</div>
                    <div class="metric-value">5</div>
                    <div class="badge badge-qc">Waiting</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Pending Shipping</div>
                    <div class="metric-value">18</div>
                    <div class="badge badge-shipped">Ship Today</div>
                </div>
            </div>

            <div class="admin-table container" style="margin-top: 2rem; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: var(--card-shadow);">
                <h3 class="table__title">Active Processing Queue</h3>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Type</th>
                            <th>Processing Step</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#ORD-101</td>
                            <td>Prescription</td>
                            <td>Fitting/Assembly</td>
                            <td><span class="badge badge-qc">Fit Now</span></td>
                        </tr>
                        <tr>
                            <td>#ORD-102</td>
                            <td>Pre-order</td>
                            <td>Receive stock</td>
                            <td><span class="badge badge-pending">Wait Stock</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
