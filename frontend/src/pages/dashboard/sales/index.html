<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales/Support Dashboard — EYEWEAR.UTH</title>
    
    <!--=============== FLATICON ===============-->
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.0.0/uicons-regular-straight/css/uicons-regular-straight.css" />
    
    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="../../../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../../../assets/css/admin.css" />

    <!--=============== LAYOUT LOADER ===============-->
    <script src="../../../../assets/js/core/layout-loader.js" defer></script>
</head>
<body class="admin-body">
    <!--=============== SIDEBAR ===============-->
    <aside class="sidebar" data-include="sidebar/sales"></aside>

    <!--=============== MAIN CONTENT ===============-->
    <main class="admin-main">
        <header class="admin-header flex" data-include="layout/AdminHeader"></header>

        <section class="section">
            <h2 class="section__title">Sales & Support Overview</h2>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">New Orders</div>
                    <div class="metric-value">24</div>
                    <div class="badge badge-pending">To Review</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Prescription Checks</div>
                    <div class="metric-value">7</div>
                    <div class="badge badge-qc">Action Needed</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Pre-order Status</div>
                    <div class="metric-value">12</div>
                    <div class="badge badge-shipped">Confirmed</div>
                </div>
            </div>

            <div class="admin-table container" style="margin-top: 2rem; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: var(--card-shadow);">
                <h3 class="table__title">Recent Customer Inquiries</h3>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Topic</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>John Doe</td>
                            <td>Prescription Adjustment</td>
                            <td><span class="badge badge-pending">Pending</span></td>
                            <td><a href="#" class="btn btn--sm">Verify</a></td>
                        </tr>
                        <tr>
                            <td>Sarah Smith</td>
                            <td>Pre-order Delivery Date</td>
                            <td><span class="badge badge-shipped">Responded</span></td>
                            <td><a href="#" class="btn btn--sm">View</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
