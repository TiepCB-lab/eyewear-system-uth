<div class="filter-block">
    <h3 class="filter-title">Search</h3>
    <div class="search-field">
        <input type="text" id="searchInput" class="form__input" placeholder="Search products...">
        <button id="searchClearBtn" class="search-clear-btn" title="Clear">
            <i class="fi fi-rs-cross-small"></i>
        </button>
    </div>
</div>

<div class="filter-block" id="categoryFilters">
    <h3 class="filter-title">Categories</h3>
    <div class="filter-options">
        <label class="filter-option">
            <input type="checkbox" value="Sunglasses"> Sunglasses
        </label>
        <label class="filter-option">
            <input type="checkbox" value="Optical"> Optical
        </label>
        <label class="filter-option">
            <input type="checkbox" value="Blue Light"> Blue Light
        </label>
    </div>
</div>

<div class="filter-block" id="brandFilters">
    <h3 class="filter-title">Brands</h3>
    <div class="filter-options">
        <label class="filter-option">
            <input type="checkbox" value="Ray-Ban"> Ray-Ban
        </label>
        <label class="filter-option">
            <input type="checkbox" value="Oakley"> Oakley
        </label>
        <label class="filter-option">
            <input type="checkbox" value="Molsion"> Molsion
        </label>
        <label class="filter-option">
            <input type="checkbox" value="Gentle Monster"> Gentle Monster
        </label>
    </div>
</div>

<div class="filter-block">
    <h3 class="filter-title">Price Range</h3>
    <div class="price-label" id="priceValue">$1000</div>
    <input type="range" id="priceRange" min="0" max="1000" value="1000" class="price-range">
</div>

<div class="filter-block">
    <label class="filter-option" style="cursor:pointer">
        <input type="checkbox" id="inStockOnly"> Show In Stock Only
    </label>
</div>
