<div class="filter-block">
    <h3 class="filter-title">Search</h3>
    <div class="search-field">
        <input type="text" id="searchInput" class="form__input" placeholder="Search products...">
        <button id="searchClearBtn" class="search-clear-btn" title="Clear">
            <i class="fi fi-rs-cross-small"></i>
        </button>
    </div>
</div>

<div class="filter-block" id="categoryFilters">
    <h3 class="filter-title">Categories</h3>
    <div class="filter-options">
        <label class="filter-option"><input type="checkbox" value="Gọng kính"> Gọng kính</label>
        <label class="filter-option"><input type="checkbox" value="Kính râm"> Kính râm</label>
        <label class="filter-option"><input type="checkbox" value="Tròng kính"> Tròng kính</label>
    </div>
</div>

<div class="filter-block" id="brandFilters">
    <h3 class="filter-title">Brands</h3>
    <div class="filter-options">
        <label class="filter-option"><input type="checkbox" value="Ray-Ban"> Ray-Ban</label>
        <label class="filter-option"><input type="checkbox" value="Oakley"> Oakley</label>
        <label class="filter-option"><input type="checkbox" value="J.Crew"> J.Crew</label>
        <label class="filter-option"><input type="checkbox" value="Daily Ritual"> Daily Ritual</label>
    </div>
</div>

<div class="filter-block">
    <h3 class="filter-title">Price Range</h3>
    <div class="price-label" id="priceValue">5.000.000 ₫</div>
    <input type="range" id="priceRange" min="0" max="5000000" step="100000" value="5000000" class="price-range">
</div>

<div class="filter-block">
    <label class="filter-option" style="cursor:pointer">
        <input type="checkbox" id="inStockOnly"> Show In Stock Only
    </label>
</div>
