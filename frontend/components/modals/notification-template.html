<div class="evelens-notify-card">
    <div class="evelens-notify-image">
        <img src="/assets/images/ui/notification-brand.png" alt="Evelens Notification" id="evelens-notify-img">
    </div>
    <div class="evelens-notify-content">
        <button class="evelens-notify-close"><i class="fi fi-rs-cross"></i></button>
        <div class="evelens-notify-brand">EVELENS</div>
        <div class="evelens-notify-icon-box">
             <i class="fi fi-rs-check" id="evelens-notify-status-icon"></i>
        </div>
        <h3 class="evelens-notify-title" id="evelens-notify-title">Notification Title</h3>
        <p class="evelens-notify-desc" id="evelens-notify-desc">Detailed message goes here.</p>
        <div class="evelens-notify-actions">
            <!-- Buttons injected by JS -->
        </div>
    </div>
</div>
