<!-- Address Editor Modal (Premium Luxury Redesign) -->
<div class="address-editor-overlay modal-overlay" id="address-editor-overlay">
  <div class="address-modal modal-content">
    <button type="button" class="address-modal__close" id="cancel-address-edit-x">
        <i class="fi fi-rs-cross"></i>
    </button>

    <div class="address-modal__header">
        <div class="address-modal__icon">
            <i class="fi fi-rs-marker"></i>
        </div>
        <div class="address-modal__title-group">
            <h2 id="address-editor-title" class="address-modal__title">Add New Address</h2>
            <p class="address-modal__subtitle">Please enter your shipping information below.</p>
        </div>
    </div>
    
    <form id="address-editor-form" class="address-modal__form">
      <input type="hidden" name="id" id="address-id-input">
      <input type="hidden" name="address" id="address-full-hidden">
      
      <div class="address-modal__row">
        <div class="address-modal__group">
          <label class="address-modal__label">Address Label <span class="label-hint">(e.g. Home, Office)</span></label>
          <div class="address-modal__input-wrapper">
              <i class="fi fi-rs-home-location-alt input-icon"></i>
              <input type="text" name="label" id="address-label-input" placeholder="e.g. Home" list="label-suggestions" required>
              <span class="input-char-count">0/50</span>
          </div>
          <datalist id="label-suggestions">
            <option value="Home">
            <option value="Office">
            <option value="Company">
            <option value="Apartment">
          </datalist>
        </div>

        <div class="address-modal__group">
          <label class="address-modal__label">Phone Number *</label>
          <div class="address-modal__input-wrapper">
              <i class="fi fi-rs-phone-call input-icon"></i>
              <input type="tel" name="phone" id="address-phone-input" placeholder="Enter phone number" required>
          </div>
        </div>
      </div>

      <div class="address-modal__row">
        <div class="address-modal__group">
          <label class="address-modal__label">Province / City *</label>
          <div class="address-modal__input-wrapper">
              <select id="address-province-select" required>
                <option value="">Select Province/City</option>
              </select>
          </div>
        </div>

        <div class="address-modal__group">
          <label class="address-modal__label">Ward / Commune *</label>
          <div class="address-modal__input-wrapper">
              <select id="address-ward-select" required disabled>
                <option value="">Select Ward/Commune</option>
              </select>
          </div>
        </div>
      </div>

      <div class="address-modal__group full-width">
        <label class="address-modal__label">House Number, Street Name *</label>
        <div class="address-modal__input-wrapper">
            <i class="fi fi-rs-map-marker input-icon"></i>
            <input type="text" id="address-street-input" placeholder="e.g. 114 Hung Vuong St, Ward 9" required>
            <span class="input-char-count">0/120</span>
        </div>
      </div>

      <div class="address-modal__checkbox">
        <label class="checkbox-container">
            <input type="checkbox" name="is_default" id="address-default-input">
            <span class="checkmark"></span>
            Set as default address
        </label>
      </div>

      <div class="address-modal__actions">
        <button type="button" class="btn-cancel" id="cancel-address-edit">Cancel</button>
        <button type="submit" class="btn-save" id="address-save-btn">Save Address</button>
      </div>
    </form>

    <div class="address-modal__footer">
        <div class="footer-item">
            <i class="fi fi-rs-shield-check"></i>
            <div class="footer-item__text">
                <strong>Data Privacy</strong>
                <span>Your information is secured</span>
            </div>
        </div>
        <div class="footer-item">
            <i class="fi fi-rs-truck-side"></i>
            <div class="footer-item__text">
                <strong>Fast Delivery</strong>
                <span>Multiple shipping options</span>
            </div>
        </div>
        <div class="footer-item">
            <i class="fi fi-rs-headset"></i>
            <div class="footer-item__text">
                <strong>24/7 Support</strong>
                <span>Always here to help</span>
            </div>
        </div>
    </div>
  </div>
</div>
