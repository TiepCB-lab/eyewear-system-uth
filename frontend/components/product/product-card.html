<div class="catalog-item">
    <div class="thumb">
        <span class="badge">{{BADGE}}</span>
        <img src="{{IMAGE}}" alt="{{NAME}}">
        <div class="thumb-actions">
            <a href="{{DETAIL_URL}}" class="thumb-action-btn" title="Quick View">
                <i class="fi fi-rs-eye"></i>
            </a>
            <button class="thumb-action-btn" onclick="addToCart('{{ID}}')" title="Add to Cart">
                <i class="fi fi-rs-shopping-cart"></i>
            </button>
        </div>
    </div>
    <div class="body">
        <div class="meta">{{CATEGORY}} — {{BRAND}}</div>
        <h3 class="name">{{NAME}}</h3>
        <div class="catalog-rating">
            <div class="catalog-rating__stars">
                <i class="fi fi-rs-star"></i>
                <i class="fi fi-rs-star"></i>
                <i class="fi fi-rs-star"></i>
                <i class="fi fi-rs-star"></i>
                <i class="fi fi-rs-star"></i>
            </div>
        </div>
        <div class="catalog-actions">
            <div class="catalog-price-group">
                <span class="price">{{PRICE}}</span>
                <span class="old-price">{{OLD_PRICE}}</span>
            </div>
            <div class="catalog-cart-wrap">
                <button class="catalog-cart-btn" onclick="addToCart('{{ID}}')" aria-label="Add to cart">
                    <i class="fi fi-rs-shopping-bag"></i>
                </button>
                <div class="catalog-cart-tooltip">Add to Cart</div>
            </div>
        </div>
    </div>
</div>
