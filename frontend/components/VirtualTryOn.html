<!-- Virtual Try-On Modal Component -->
<div id="virtual-tryon-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
    <div class="modal__content" style="background:#fff; width:min(800px, 95%); height:min(600px, 80%); border-radius:20px; position:relative; overflow:hidden; display:flex; flex-direction:column;">
        <div class="modal__header" style="padding:1.5rem; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;">Virtual Try-On</h3>
            <button onclick="closeTryOn()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div class="modal__body" style="flex:1; background:#000; position:relative; display:flex; align-items:center; justify-content:center; color:#fff;">
            <div id="camera-placeholder">
                <i class="fi fi-rs-camera" style="font-size:4rem; display:block; margin-bottom:1rem; opacity:0.5;"></i>
                <p>Initializing Camera...</p>
                <small style="opacity:0.7;">(Camera access required for AR simulation)</small>
            </div>
            <video id="tryon-video" autoplay playsinline style="width:100%; height:100%; object-fit:cover; display:none;"></video>
            <canvas id="tryon-canvas" style="position:absolute; inset:0; width:100%; height:100%;"></canvas>
        </div>
        <div class="modal__footer" style="padding:1rem; border-top:1px solid #eee; display:flex; gap:1rem; justify-content:center;">
            <button class="btn btn--sm" onclick="snapshot()">Take Photo</button>
            <button class="btn btn--sm" style="background:#eee; color:#333;" onclick="closeTryOn()">Close</button>
        </div>
    </div>
</div>

<script>
    function openTryOn() {
        const modal = document.getElementById('virtual-tryon-modal');
        modal.style.display = 'flex';
        // Mock camera logic
        setTimeout(() => {
            const placeholder = document.getElementById('camera-placeholder');
            if(placeholder) placeholder.innerHTML = '<p style="color:#10b981;">AR Virtual Try-On Active</p><small>Simulation Mode</small>';
        }, 1500);
    }

    function closeTryOn() {
        document.getElementById('virtual-tryon-modal').style.display = 'none';
    }

    // Bind to the try-on button in the details page
    document.addEventListener('click', (e) => {
        if(e.target.closest('.btn-tryon')) {
            e.preventDefault();
            openTryOn();
        }
    });
</script>
