<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found | EYEWEAR.UTH</title>
  <link rel="stylesheet" href="/frontend/assets/css/styles.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, #eef2f7 60%, #e5e7eb 100%);
      color: #111827;
    }
    .wrap {
      width: min(720px, calc(100% - 32px));
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 24px 60px -30px rgba(0,0,0,.35);
      text-align: center;
    }
    .code {
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -0.08em;
      margin: 0;
      line-height: 1;
    }
    h1 {
      margin: 16px 0 10px;
      font-size: 32px;
    }
    p {
      margin: 0 auto 24px;
      max-width: 520px;
      color: #6b7280;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid #111827;
      color: #111827;
      background: transparent;
    }
    .btn-link.primary {
      background: #111827;
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has moved. Use the buttons below to go back to the store or sign in again.</p>
    <div class="actions">
      <a class="btn-link primary" href="/frontend/index.html">Go Home</a>
      <a class="btn-link" href="/frontend/pages/auth/index.html">Sign In</a>
    </div>
  </main>
</body>
</html>
